name: Apply documentation review

on:
  push:
    branches: [openai/document-flex-json-api-final]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 scripts/pr15-fix-doc-sections.py
          python3 scripts/pr15-fix-doc-rows.py
          sh scripts/pr15-fix-readme.sh
          rm scripts/pr15-fix-doc-sections.py scripts/pr15-fix-doc-rows.py scripts/pr15-fix-readme.sh
          rm .github/workflows/apply-documentation-review.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Document pinned protocol conflicts"
          git push
