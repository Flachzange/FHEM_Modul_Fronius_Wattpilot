name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Perl dependencies
        run: sudo apt-get update && sudo apt-get install -y libjson-perl libcrypt-pbkdf2-perl libcrypt-bcrypt-perl
      - name: Run checks
        run: sh scripts/ci.sh
