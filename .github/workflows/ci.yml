name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Capture Issue 8 transform
        run: |
          set +e
          python3 scripts/run_issue8_transform.py > issue8-transform.log 2>&1
          printf '%s\n' "$?" > issue8-transform.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue8-transform-diagnostic
          path: |
            issue8-transform.log
            issue8-transform.status
          if-no-files-found: error
      - name: Validate transform
        run: test "$(cat issue8-transform.status)" = "0"
