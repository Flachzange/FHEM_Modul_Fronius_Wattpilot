name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Perl dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-zip-perl libjson-perl libcrypt-pbkdf2-perl libcrypt-urandom-perl libcrypt-bcrypt-perl
      - name: Run checks
        run: sh scripts/ci.sh
      - name: Build and verify release
        run: WATTPILOT_SKIP_SOURCE_CI=1 sh scripts/build-release.sh
      - name: Verify reproducible release
        run: WATTPILOT_SKIP_SOURCE_CI=1 sh scripts/check_reproducible_release.sh
