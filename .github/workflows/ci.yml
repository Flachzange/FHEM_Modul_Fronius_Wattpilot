name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Apply Issue 8 implementation
        run: python3 scripts/run_issue8_transform.py
      - name: Install Perl dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-zip-perl libjson-perl libcrypt-pbkdf2-perl libcrypt-bcrypt-perl
      - name: Run repository checks
        run: |
          set +e
          sh scripts/ci.sh > issue8-ci.log 2>&1
          printf '%s\n' "$?" > issue8-ci.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue8-ci-diagnostic
          path: |
            issue8-ci.log
            issue8-ci.status
          if-no-files-found: error
      - name: Validate repository checks
        run: test "$(cat issue8-ci.status)" = "0"
