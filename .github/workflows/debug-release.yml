name: Release diagnostic

on:
  push:
    branches:
      - review-issue-11-protocol-conflicts
    paths:
      - .github/workflows/debug-release.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Perl dependencies
        run: sudo apt-get update && sudo apt-get install -y libjson-perl libdigest-sha-perl libmime-base64-perl libcrypt-pbkdf2-perl libcrypt-bcrypt-perl
      - name: Run release build
        id: build
        continue-on-error: true
        run: scripts/build-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-diagnostic
          path: dist
          if-no-files-found: error
      - name: Preserve failure status
        if: steps.build.outcome != 'success'
        run: exit 1
